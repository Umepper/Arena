<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: #050505;
      overflow: hidden;
      color: #f0d98a;
      font-family: Georgia, serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050505;
    }

    /* ---------- INTRO ---------- */
    #intro {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: radial-gradient(ellipse at center, #0d0a04 0%, #050505 70%);
      z-index: 100;
    }

    #start {
      font-size: 44px;
      padding: 22px 60px;
      background: transparent;
      border: 3px solid #f0d98a;
      color: #f0d98a;
      cursor: pointer;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 4px;
      position: relative;
      overflow: hidden;
      transition: color .25s ease, box-shadow .3s ease, transform .3s ease;
    }

    #start::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
        transparent 30%,
        rgba(240, 217, 138, .25) 50%,
        transparent 70%);
      transform: translateX(-120%);
      transition: transform .6s ease;
    }

    #start:hover::before { transform: translateX(120%); }

    #start:hover {
      box-shadow:
        0 0 30px rgba(240, 217, 138, .55),
        inset 0 0 25px rgba(240, 217, 138, .12);
      transform: scale(1.05);
    }

    #start:active { transform: scale(.97); }

    #subtitle {
      margin-top: 22px;
      color: #b8934d;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* ---------- IMPACT FLASH ---------- */
    #impactFlash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center,
        #ffffff 0%,
        #ffedb0 35%,
        rgba(255, 213, 74, .6) 60%,
        transparent 100%);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }

    #impactFlash.flash { animation: impactFlash 160ms ease-out; }

    @keyframes impactFlash {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ---------- FINAL UI ---------- */
    /* uiWrap: JS bass-shake buna uygulanır (transform + filter) */
    #uiWrap {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
      will-change: transform, filter;
    }

    #uiWrap.show { display: block; }

    #ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(80, 55, 15, .35) 0%, transparent 60%),
        linear-gradient(135deg, #0a0805 0%, #1a0f05 50%, #0a0805 100%);
    }

    /* ince altın toz dokusu */
    #ui::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(240,217,138,.35), transparent),
        radial-gradient(1px 1px at 70% 60%, rgba(240,217,138,.25), transparent),
        radial-gradient(2px 2px at 40% 80%, rgba(240,217,138,.2), transparent),
        radial-gradient(1px 1px at 85% 20%, rgba(240,217,138,.3), transparent);
      animation: dustDrift 14s linear infinite;
      opacity: .7;
    }

    @keyframes dustDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(-40px); }
    }

    #title {
      font-size: clamp(48px, 9vw, 84px);
      font-weight: 900;
      margin: 0 0 10px 0;
      color: #f0d98a;
      text-shadow:
        0 0 20px rgba(240, 217, 138, .8),
        0 0 60px rgba(200, 150, 50, .45),
        0 4px 0 rgba(0,0,0,.6);
      letter-spacing: 4px;
      line-height: 1.15;
      text-align: center;
      opacity: 0;
    }

    /* darbeyle içeri çakılan başlık */
    #uiWrap.show #title {
      animation: titleSlam 420ms cubic-bezier(.15, 1.2, .3, 1) forwards;
    }

    @keyframes titleSlam {
      0% {
        opacity: 0;
        transform: scale(2.8);
        filter: blur(16px);
        letter-spacing: 24px;
      }
      55% {
        opacity: 1;
        transform: scale(.94);
        filter: blur(0);
        letter-spacing: 3px;
      }
      75% { transform: scale(1.03); }
      100% {
        opacity: 1;
        transform: scale(1);
        letter-spacing: 4px;
      }
    }

    #join {
      padding: 18px 60px;
      font-size: 19px;
      background: linear-gradient(180deg, #ffe9a3 0%, #f0d98a 45%, #d9b95c 100%);
      color: #120c03;
      border: 1px solid #fff3c4;
      font-weight: 900;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 2px;
      margin-top: 42px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 24px rgba(240, 217, 138, .45),
        0 6px 18px rgba(0, 0, 0, .55),
        inset 0 1px 0 rgba(255,255,255,.6);
      transition: transform .2s cubic-bezier(.2,1.6,.4,1), box-shadow .25s ease;
      opacity: 0;
    }

    #uiWrap.show #join {
      animation: elementRise 380ms ease-out 180ms forwards;
    }

    #join::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg,
        transparent 35%,
        rgba(255, 255, 255, .55) 50%,
        transparent 65%);
      transform: translateX(-130%);
    }

    #join:hover::before {
      transition: transform .55s ease;
      transform: translateX(130%);
    }

    #join:hover {
      transform: scale(1.07);
      box-shadow:
        0 0 45px rgba(240, 217, 138, .8),
        0 8px 24px rgba(0, 0, 0, .6),
        inset 0 1px 0 rgba(255,255,255,.7);
    }

    #join:active { transform: scale(.96); }

    .secondaryBtn {
      margin-top: 16px;
      padding: 12px 34px;
      background: rgba(240, 217, 138, .04);
      color: #f0d98a;
      border: 2px solid rgba(240, 217, 138, .8);
      cursor: pointer;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 1px;
      transition: all .25s ease;
      opacity: 0;
    }

    #uiWrap.show .secondaryBtn {
      animation: elementRise 380ms ease-out 300ms forwards;
    }

    .secondaryBtn:hover {
      background: rgba(240, 217, 138, .14);
      box-shadow: 0 0 18px rgba(240, 217, 138, .3);
      transform: scale(1.05);
    }

    .secondaryBtn:active { transform: scale(.96); }

    #patron {
      font-size: 11px;
      color: #8b6f1e;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 34px;
      opacity: 0;
    }

    #uiWrap.show #patron {
      animation: elementRise 380ms ease-out 460ms forwards;
    }

    @keyframes elementRise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="intro">
    <button id="start">▶ BAŞLA</button>
    <div id="subtitle">Kulaklık önerilir.</div>
  </div>

  <div id="impactFlash"></div>

  <div id="uiWrap">
    <div id="ui">
      <h1 id="title">ARENA'YA GELSENE</h1>
      <button id="join">OYUNA KATIL</button>
      <button id="downloadLauncher" class="secondaryBtn">LAUNCHER'I İNDİR</button>
      <small id="patron">PATRON HAZIR!</small>
    </div>
  </div>

  <script>
    function init() {
      console.log('✓ Script başladı');

      const canvas = document.getElementById('canvas');
      const startBtn = document.getElementById('start');
      const uiWrap = document.getElementById('uiWrap');
      const impactFlash = document.getElementById('impactFlash');

      if (!canvas || !startBtn) {
        console.error('❌ DOM elemanları bulunamadı!');
        return;
      }

      const ctx = canvas.getContext('2d');

      // ---- DPR-aware canvas (retina'da net görüntü) ----
      let W = 0, H = 0, DPR = 1;
      function resize() {
        DPR = Math.min(2, window.devicePixelRatio || 1);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
      }
      resize();
      window.addEventListener('resize', resize);

      const rand = (a, b) => a + Math.random() * (b - a);

      // ============================================================
      //  BASS SHAKE MOTORU (trauma tabanlı)
      //  - Sallanma gücü "trauma" (0..1) olarak tutulur, kare değil
      //    zaman bazlı söner.
      //  - Ofset katmanlı düşük frekanslı gürültüden gelir: pozisyon
      //    + ROTASYON + ZOOM PUMP. (Vegas bass shake hissinin sırrı
      //    rotasyon ve zoom'un pozisyonla birlikte vurması.)
      // ============================================================
      const shake = {
        trauma: 0,
        zoom: 0,
        hit(amount, zoomKick) {
          this.trauma = Math.min(1.2, this.trauma + amount);
          this.zoom = Math.max(this.zoom, zoomKick || 0);
        },
        update(dt) {
          this.trauma = Math.max(0, this.trauma - dt * 2.1);
          // zoom pump çok hızlı söner -> "bass vuruşu" hissi
          this.zoom *= Math.pow(0.001, dt);
          if (this.zoom < 0.0005) this.zoom = 0;
        },
        // katmanlı sinüs gürültüsü (düşük frekans = ağır sarsıntı)
        noise(t, f, seed) {
          return Math.sin(t * f + seed) * 0.55 +
                 Math.sin(t * f * 2.3 + seed * 1.7) * 0.3 +
                 Math.sin(t * f * 5.1 + seed * 3.1) * 0.15;
        },
        sample(now) {
          const s = Math.min(1, this.trauma);
          const p = s * s; // karesel düşüş: küçük trauma neredeyse hissedilmez
          return {
            x: 46 * p * this.noise(now, 0.052, 1),
            y: 34 * p * this.noise(now, 0.047, 7),
            rot: 0.045 * p * this.noise(now, 0.06, 13),
            scale: 1 + this.zoom + 0.03 * p
          };
        }
      };

      // ============================================================
      //  PARÇACIK SİSTEMLERİ
      // ============================================================
      let particles = [];    // rüzgar/köz
      let sparks = [];       // darbe kıvılcımları (çizgi/streak)
      let shockwaves = [];   // genişleyen halkalar
      let speedLines = [];   // radyal hız çizgileri
      let flashLevel = 0;    // canvas içi beyaz flaş
      let aberration = 0;    // sahte kromatik sapma şiddeti

      class Particle {
        constructor(x, y) {
          this.x = x; this.y = y;
          this.vx = rand(-1, 1);
          this.vy = rand(-2.5, -0.5);
          this.size = rand(0.5, 2.5);
          this.life = 1;
          this.decay = rand(0.003, 0.011);
          this.flicker = rand(0, Math.PI * 2);
        }
        update(dt) {
          this.x += this.vx;
          this.y += this.vy;
          this.vy -= 0.06;
          this.life -= this.decay;
          this.flicker += dt * 6;
        }
        draw(ctx) {
          const a = Math.max(0, this.life * (0.6 + 0.3 * Math.sin(this.flicker)));
          ctx.globalAlpha = a;
          ctx.fillStyle = '#f0d98a';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      // Kıvılcım: hız yönünde uzayan streak, yerçekimi + sürtünme
      class Spark {
        constructor(x, y) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(6, 26);
          this.x = x; this.y = y;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.life = 1;
          this.decay = rand(0.012, 0.03);
          this.width = rand(1, 3.5);
          this.hot = Math.random() < 0.35; // %35'i beyaz-sıcak
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.94;
          this.vy = this.vy * 0.94 + 0.5; // yerçekimi
          this.life -= this.decay;
        }
        draw(ctx) {
          if (this.life <= 0) return;
          ctx.globalAlpha = this.life;
          ctx.strokeStyle = this.hot ? '#fff6d8' : '#ffd54a';
          ctx.lineWidth = this.width * this.life;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x - this.vx * 1.6, this.y - this.vy * 1.6);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      class Shockwave {
        constructor(x, y, delay, maxR, width) {
          this.x = x; this.y = y;
          this.delay = delay;      // ms cinsinden gecikme
          this.born = Date.now();
          this.maxR = maxR;
          this.width = width;
          this.duration = 550;
        }
        progress() {
          const t = Date.now() - this.born - this.delay;
          if (t < 0) return -1;
          return Math.min(1, t / this.duration);
        }
        draw(ctx) {
          const p = this.progress();
          if (p < 0 || p >= 1) return;
          const ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
          const r = this.maxR * ease;
          const alpha = (1 - p) * 0.9;

          // sahte kromatik sapma: hafif ofsetli 3 katman
          const off = aberration * 6 * (1 - p);
          ctx.lineWidth = this.width * (1 - p * 0.6);

          ctx.globalAlpha = alpha * 0.35;
          ctx.strokeStyle = '#ff9d5c';
          ctx.beginPath();
          ctx.arc(this.x - off, this.y, r, 0, Math.PI * 2);
          ctx.stroke();

          ctx.globalAlpha = alpha * 0.35;
          ctx.strokeStyle = '#9adfff';
          ctx.beginPath();
          ctx.arc(this.x + off, this.y, r, 0, Math.PI * 2);
          ctx.stroke();

          ctx.globalAlpha = alpha;
          ctx.strokeStyle = '#ffe9a3';
          ctx.shadowColor = '#ffd54a';
          ctx.shadowBlur = 25 * (1 - p);
          ctx.beginPath();
          ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
        }
        alive() { return this.progress() < 1; }
      }

      class SpeedLine {
        constructor(cx, cy, converging) {
          this.cx = cx; this.cy = cy;
          this.angle = rand(0, Math.PI * 2);
          this.converging = converging; // true: içeri akar, false: dışarı patlar
          this.life = 1;
          this.decay = rand(0.02, 0.05);
          this.dist = converging ? rand(300, Math.max(W, H) * 0.7) : rand(60, 140);
          this.len = rand(60, 200);
          this.speed = rand(8, 22);
          this.width = rand(1, 2.5);
        }
        update() {
          this.dist += this.converging ? -this.speed : this.speed;
          this.life -= this.decay;
          if (this.converging && this.dist < 40) this.life = 0;
        }
        draw(ctx) {
          if (this.life <= 0) return;
          const x1 = this.cx + Math.cos(this.angle) * this.dist;
          const y1 = this.cy + Math.sin(this.angle) * this.dist;
          const x2 = this.cx + Math.cos(this.angle) * (this.dist + this.len);
          const y2 = this.cy + Math.sin(this.angle) * (this.dist + this.len);
          ctx.globalAlpha = this.life * 0.7;
          ctx.strokeStyle = '#f0d98a';
          ctx.lineWidth = this.width;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      function addParticles(x, y, count) {
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(
            x + rand(-40, 40),
            y + rand(-20, 20)
          ));
        }
      }

      // ============================================================
      //  IMPACT — tek merkezi patlama fonksiyonu
      // ============================================================
      function triggerImpact() {
        const cx = W / 2, cy = H / 2;

        // 1) ekran sarsıntısı: ağır trauma + zoom pump
        shake.hit(1.1, 0.12);

        // 2) kıvılcım patlaması
        for (let i = 0; i < 110; i++) sparks.push(new Spark(cx, cy));

        // 3) kademeli şok dalgaları
        shockwaves.push(new Shockwave(cx, cy, 0, Math.max(W, H) * 0.55, 14));
        shockwaves.push(new Shockwave(cx, cy, 70, Math.max(W, H) * 0.75, 8));
        shockwaves.push(new Shockwave(cx, cy, 150, Math.max(W, H) * 0.95, 4));

        // 4) dışa patlayan hız çizgileri
        for (let i = 0; i < 26; i++) speedLines.push(new SpeedLine(cx, cy, false));

        // 5) canvas flaşı + kromatik sapma
        flashLevel = 1;
        aberration = 1;
      }

      // ============================================================
      //  SES YÖNETİCİSİ — dosyalar, isimler, yollar AYNEN korundu
      // ============================================================
      const sounds = {};
      [
        'wind-sound-fx',
        'battlefield-theme',
        'Charge',
        'impact',
        'bass-drop',
        'undertale-sparkles',
        'accept'
      ].forEach(name => {
        const audio = new Audio(`sounds/${name}.mp3`);
        audio.volume = 0.7;
        sounds[name] = audio;
      });

      console.log('✓ Sesler yüklendi');

      let animState = 'intro';
      let animStartTime = 0;
      let globalAnimStart = 0;
      let soundTiming = {
        impact: false,
        charge: false,
        bassDrop: false,
        sparkles: false
      };

      function playSound(name) {
        try {
          sounds[name].currentTime = 0;
          const promise = sounds[name].play();
          if (promise && promise.then) {
            promise.catch(e => console.error(name, e));
          }
        } catch (e) {
          console.log(`Sound error: ${name}`);
        }
      }

      function startAnimation() {
        console.log('🎯 START CLICKED');
        if (animState !== 'intro') return;

        animState = 'wind';
        animStartTime = Date.now();
        globalAnimStart = Date.now();
        document.getElementById('intro').style.display = 'none';
        playSound('wind-sound-fx');
        playSound('battlefield-theme');

        console.log('✓ Animasyon başladı');
      }

      // ============================================================
      //  ÇİZİM YARDIMCILARI
      // ============================================================
      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, '#060606');
        g.addColorStop(0.25, '#0d0905');
        g.addColorStop(0.5, '#151008');
        g.addColorStop(0.75, '#0c0905');
        g.addColorStop(1, '#040404');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);

        const vignette = ctx.createRadialGradient(
          W / 2, H / 2, 200,
          W / 2, H / 2, Math.max(W, H)
        );
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,.72)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);
      }

      // yazı: yumuşak pop-in (alpha + scale), zamanlamayı DEĞİŞTİRMEZ,
      // sadece metnin ekrana girişini yumuşatır
      function drawText(text, size, appearElapsed) {
        const IN = 220; // ms giriş animasyonu
        const t = appearElapsed === undefined ? 1 :
          Math.min(1, appearElapsed / IN);
        const ease = 1 - Math.pow(1 - t, 3);
        const alpha = ease;
        const scale = 0.92 + 0.08 * ease;

        ctx.save();
        ctx.translate(W / 2, H / 2);
        ctx.scale(scale, scale);
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${size}px Georgia, serif`;
        ctx.fillStyle = '#f0d98a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = `rgba(240, 217, 138, ${0.5 * alpha})`;
        ctx.shadowBlur = 20;
        ctx.fillText(text, 0, 0);
        ctx.restore();
      }

      function drawGlow(intensity) {
        const gradient = ctx.createRadialGradient(
          W / 2, H / 2, 0,
          W / 2, H / 2, Math.max(W, H)
        );
        gradient.addColorStop(0, `rgba(240, 217, 138, ${0.08 * intensity})`);
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);
      }

      function updateFx(dt) {
        particles.forEach(p => p.update(dt));
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => p.draw(ctx));

        sparks.forEach(s => s.update());
        sparks = sparks.filter(s => s.life > 0);
        sparks.forEach(s => s.draw(ctx));

        speedLines.forEach(l => l.update());
        speedLines = speedLines.filter(l => l.life > 0);
        speedLines.forEach(l => l.draw(ctx));

        shockwaves = shockwaves.filter(s => s.alive());
        shockwaves.forEach(s => s.draw(ctx));

        // canvas içi flaş
        if (flashLevel > 0.01) {
          ctx.globalAlpha = flashLevel;
          const fg = ctx.createRadialGradient(
            W / 2, H / 2, 0,
            W / 2, H / 2, Math.max(W, H) * 0.8
          );
          fg.addColorStop(0, '#ffffff');
          fg.addColorStop(0.4, 'rgba(255, 237, 176, .8)');
          fg.addColorStop(1, 'rgba(255, 213, 74, 0)');
          ctx.fillStyle = fg;
          ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 1;
          flashLevel *= Math.pow(0.0001, dt); // çok hızlı söner
        } else {
          flashLevel = 0;
        }

        if (aberration > 0.01) {
          aberration *= Math.pow(0.005, dt);
        } else {
          aberration = 0;
        }
      }

      // ============================================================
      //  UI BASS SHAKE — UI açıldığı an uiWrap'e trauma sarsıntısı
      //  (translate + rotate + scale + brightness pump)
      // ============================================================
      let uiTrauma = 0;
      let uiZoom = 0;
      let uiShakeRunning = false;

      function uiBassShake() {
        uiTrauma = 1;
        uiZoom = 0.10;
        if (uiShakeRunning) return;
        uiShakeRunning = true;

        let last = performance.now();

        function frame(now) {
          const dt = Math.min(0.05, (now - last) / 1000);
          last = now;

          uiTrauma = Math.max(0, uiTrauma - dt * 1.6);
          uiZoom *= Math.pow(0.002, dt);

          const p = uiTrauma * uiTrauma;
          const n = (f, seed) =>
            Math.sin(now * f + seed) * 0.55 +
            Math.sin(now * f * 2.3 + seed * 1.7) * 0.3 +
            Math.sin(now * f * 5.1 + seed * 3.1) * 0.15;

          const x = 55 * p * n(0.05, 2);
          const y = 40 * p * n(0.045, 9);
          const rot = 2.4 * p * n(0.058, 17); // derece
          const scale = 1 + uiZoom + 0.04 * p;
          const bright = 1 + 1.6 * p + 8 * uiZoom;

          uiWrap.style.transform =
            `translate(${x.toFixed(1)}px, ${y.toFixed(1)}px) ` +
            `rotate(${rot.toFixed(2)}deg) scale(${scale.toFixed(3)})`;
          uiWrap.style.filter = `brightness(${bright.toFixed(2)})`;

          if (uiTrauma > 0.005 || uiZoom > 0.001) {
            requestAnimationFrame(frame);
          } else {
            uiWrap.style.transform = '';
            uiWrap.style.filter = '';
            uiShakeRunning = false;
          }
        }
        requestAnimationFrame(frame);
      }

      // ============================================================
      //  ANA DÖNGÜ
      // ============================================================
      let lastFrame = performance.now();

      function animate(nowHi) {
        const now = nowHi || performance.now();
        const dt = Math.min(0.05, (now - lastFrame) / 1000);
        lastFrame = now;

        shake.update(dt);
        const shk = shake.sample(now);

        // DPR + sarsıntı dönüşümü: translate + ROTATE + ZOOM
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.save();
        ctx.translate(W / 2 + shk.x, H / 2 + shk.y);
        ctx.rotate(shk.rot);
        ctx.scale(shk.scale, shk.scale);
        ctx.translate(-W / 2, -H / 2);

        drawBackground();
        const elapsed = Date.now() - animStartTime;

        // ------------------- STATE'LER -------------------
        // Tüm süreler orijinaliyle BİREBİR aynı.

        if (animState === 'wind') {
          const p = Math.min(1, elapsed / 5000);

          const gradient = ctx.createLinearGradient(0, 0, 0, H);
          gradient.addColorStop(0, `rgba(20, 15, 10, ${0.2 + p * 0.5})`);
          gradient.addColorStop(0.5, `rgba(40, 25, 8, ${0.15 + p * 0.3})`);
          gradient.addColorStop(1, 'rgba(10, 5, 0, 0.1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, W, H);

          ctx.save();
          ctx.translate(Math.sin(p * Math.PI) * 80, -p * 120);
          drawGlow(p);
          if (Math.random() < 0.5) {
            addParticles(W / 2 + rand(-250, 250), H / 2 - 250, 1);
          }
          ctx.restore();

          if (elapsed > 5000) {
            animState = 'text';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'text') {
          if (Math.random() < 0.4) {
            addParticles(W / 2 + rand(-250, 250), H / 2 - 250, 1);
          }
          drawGlow(0.5);

          const texts = [
            { time: 0, text: 'Savaş yeniden başlıyor...' },
            { time: 1200, text: 'Arena kapıları açıldı.' },
            { time: 2400, text: 'Rakip takım bulundu.' },
            { time: 3200, text: '5 rakip.' },
            { time: 3800, text: '2 dövüşçü.' },
            { time: 4400, text: 'Zafer olasılığı hesaplanıyor...' }
          ];

          let currentText = texts[0];
          for (let t of texts) {
            if (elapsed >= t.time) currentText = t;
          }

          drawText(currentText.text, 36, elapsed - currentText.time);

          if (elapsed > 5500) {
            animState = 'probability';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'probability') {
          if (Math.random() < 0.4) {
            addParticles(W / 2 + rand(-250, 250), H / 2 - 250, 1);
          }

          // %0.4 — çarparak girer, hafif titreşir, gölge-hayalet bırakır
          const IN = 260;
          const t = Math.min(1, elapsed / IN);
          const ease = 1 - Math.pow(1 - t, 4);
          const scale = 2.2 - 1.2 * ease;
          const jitterX = t >= 1 ? rand(-1.5, 1.5) : 0;
          const jitterY = t >= 1 ? rand(-1.5, 1.5) : 0;

          // giriş anında ufak sarsıntı
          if (elapsed < 30) shake.hit(0.35, 0.03);

          ctx.save();
          ctx.translate(W / 2 + jitterX, H / 2 + jitterY);
          ctx.scale(scale, scale);
          ctx.globalAlpha = ease;

          // hayalet katman
          ctx.font = 'bold 140px Georgia, serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.globalAlpha = ease * 0.25;
          ctx.fillStyle = '#ff9d5c';
          ctx.fillText('%0.4', -3, 0);
          ctx.fillStyle = '#9adfff';
          ctx.fillText('%0.4', 3, 0);

          // ana katman
          ctx.globalAlpha = ease;
          ctx.fillStyle = '#f0d98a';
          ctx.shadowColor = 'rgba(240, 217, 138, .6)';
          ctx.shadowBlur = 30;
          ctx.fillText('%0.4', 0, 0);
          ctx.restore();

          if (elapsed > 1800) {
            animState = 'missing';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'missing') {
          if (Math.random() < 0.4) {
            addParticles(W / 2 + rand(-250, 250), H / 2 - 250, 1);
          }

          drawText('Bir dövüşçü eksik.', 36, elapsed);

          if (elapsed > 1200) {
            animState = 'charge';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'charge') {
          if (Math.random() < 0.4) {
            addParticles(W / 2 + rand(-250, 250), H / 2 - 250, 1);
          }

          const p = Math.min(1, elapsed / 800);
          const cx = W / 2, cy = H / 2;

          // içeri çöken halkalar (enerji toplanıyor)
          for (let i = 0; i < 4; i++) {
            const radius = (240 + i * 90) * (1 - p) + 30;
            ctx.strokeStyle = `rgba(240, 217, 138, ${p * (0.5 - i * 0.1)})`;
            ctx.lineWidth = 2 + i * 1.5 + p * 3;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();
          }

          // merkezde büyüyen çekirdek
          const coreR = 6 + p * p * 40;
          const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 3);
          core.addColorStop(0, `rgba(255, 246, 216, ${p})`);
          core.addColorStop(0.35, `rgba(255, 213, 74, ${p * 0.7})`);
          core.addColorStop(1, 'rgba(255, 213, 74, 0)');
          ctx.fillStyle = core;
          ctx.beginPath();
          ctx.arc(cx, cy, coreR * 3, 0, Math.PI * 2);
          ctx.fill();

          // içeri emilen hız çizgileri
          if (Math.random() < 0.6) {
            speedLines.push(new SpeedLine(cx, cy, true));
          }

          // gerilim titremesi giderek artar
          shake.hit(0.015 * p, 0);

          if (elapsed > 800) {
            animState = 'punch';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'punch') {
          const duration = 520;
          const p = Math.min(1, elapsed / duration);
          const cx = W / 2, cy = H / 2;

          // sahne kararır, hız çizgileri içeri fırlar: darbe geliyor
          ctx.fillStyle = `rgba(0, 0, 0, ${p * 0.55})`;
          ctx.fillRect(0, 0, W, H);

          if (Math.random() < 0.9) {
            speedLines.push(new SpeedLine(cx, cy, true));
            speedLines.push(new SpeedLine(cx, cy, true));
          }

          // son %25'te merkez beyaz-sıcak parlar
          if (p > 0.75) {
            const hot = (p - 0.75) / 0.25;
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120 * hot + 10);
            g.addColorStop(0, `rgba(255, 255, 255, ${hot})`);
            g.addColorStop(1, 'rgba(255, 246, 216, 0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, 120 * hot + 10, 0, Math.PI * 2);
            ctx.fill();
          }

          if (elapsed >= duration) {
            animState = 'hitstop';
            animStartTime = Date.now();
            triggerImpact(); // <<< TEK MERKEZİ PATLAMA
          }
        }

        else if (animState === 'hitstop') {
          // 100ms donma: dünya bir an durur, sadece flaş ve dalga yaşar
          if (elapsed >= 100) {
            animState = 'final';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'final') {
          const fadeProgress = Math.min(1, elapsed / 400);

          ctx.globalAlpha = fadeProgress;
          ctx.fillStyle = '#050505';
          ctx.fillRect(0, 0, W, H);
          ctx.globalAlpha = 1;

          if (elapsed > 400) {
            canvas.style.display = 'none';

            uiWrap.classList.add('show');

            impactFlash.classList.remove('flash');
            void impactFlash.offsetWidth;
            impactFlash.classList.add('flash');

            uiBassShake(); // <<< UI'a gerçek bass shake

            animState = 'done';
          }
        }

        // ------------------- SES ZAMANLAMASI -------------------
        // BU BLOK ORİJİNALİYLE BİREBİR AYNI — DEĞİŞTİRİLMEDİ.
        const totalTimeToUI = 5000 + 5500 + 1800 + 1200 + 800 + 200 + 100 + 400;
        const globalElapsed = Date.now() - globalAnimStart;

        if (animState !== 'intro') {

          // Impact - UI görünmeden 5.5 saniye önce
          if (!soundTiming.impact && globalElapsed >= totalTimeToUI - 3000) {
            playSound('impact');
            soundTiming.impact = true;
            console.log('🔊 IMPACT');
          }

          // Bass Drop: UI'dan 100 ms önce
          if (!soundTiming.bassDrop && globalElapsed >= totalTimeToUI - 100) {
            playSound('bass-drop');
            soundTiming.bassDrop = true;
            console.log('💥 BASS DROP');
          }

          // Charge - UI görünmeden 4 saniye önce
          if (!soundTiming.charge && globalElapsed >= totalTimeToUI - 4300) {
            playSound('Charge');
            soundTiming.charge = true;
            console.log('⚡ CHARGE');
          }

          // Sparkles - UI göründükten sonra
          if (
            animState === 'done' &&
            !soundTiming.sparkles &&
            globalElapsed >= totalTimeToUI + 1000
          ) {
            playSound('undertale-sparkles');
            soundTiming.sparkles = true;
            console.log('✨ SPARKLES');
          }
        }

        // ------------------- FX -------------------
        updateFx(dt);

        ctx.restore();
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);

      // ============================================================
      //  EVENT LISTENER'LAR
      // ============================================================
      startBtn.addEventListener('click', startAnimation);
      console.log('✓ Event listener bağlandı');

      const joinBtn = document.getElementById('join');
      if (joinBtn) {
        joinBtn.addEventListener('click', () => {
          console.log('🎮 JOIN clicked');
          playSound('accept');

          setTimeout(() => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = 'arena://play';
            document.body.appendChild(iframe);
          }, 400);
        });
      }

      const downloadBtn = document.getElementById('downloadLauncher');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', () => {
          playSound('accept');
          window.location.href = 'downloads/ArenaLauncherSetup.exe';
        });
      }
    } // init() burada biter

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
