<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #0a0805;
      overflow: hidden;
      color: #f0d98a;
      font-family: Georgia, serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050505;
    }

    #intro {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #050505;
      z-index: 100;
    }

    #start {
      font-size: 48px;
      padding: 20px 50px;
      background: transparent;
      border: 3px solid #f0d98a;
      color: #f0d98a;
      cursor: pointer;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 3px;
      transition: all 0.3s ease;
    }

    #start:hover {
      background: rgba(240, 217, 138, 0.1);
      box-shadow: 0 0 30px rgba(240, 217, 138, 0.6);
      transform: scale(1.05);
    }

    #subtitle {
      margin-top: 20px;
      color: #b8934d;
      font-size: 12px;
      letter-spacing: 1px;
    }
#impactFlash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}

#impactFlash.flash {
    animation: impactFlash 90ms ease-out;
}

@keyframes impactFlash {

    0% {
        opacity: 1;
    }

    100% {
        opacity: 0;
    }

}
    #ui {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0805 0%, #1a0f05 50%, #0a0805 100%);
      z-index: 100;
    }

    #ui.show {
      display: flex;
    }

    #title {
      font-size: 80px;
      font-weight: 900;
      margin: 0 0 30px 0;
      color: #f0d98a;
      text-shadow:
        0 0 20px rgba(240, 217, 138, 0.8),
        0 0 40px rgba(200, 150, 50, 0.4);
      letter-spacing: 4px;
      animation: fadeIn 0.8s ease;
      line-height: 1.2;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #join {
      padding: 16px 56px;
      font-size: 18px;
      background: #f0d98a;
      color: #050505;
      border: none;
      font-weight: 900;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 2px;
      margin-top: 40px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(240, 217, 138, 0.4);
    }

    #join:hover {
      background: #fff0b3;
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(240, 217, 138, 0.8);
    }
.secondaryBtn {
  margin-top: 15px;
  padding: 10px 30px;
  background: transparent;
  color: #f0d98a;
  border: 2px solid #f0d98a;
  cursor: pointer;
  font-family: Georgia, serif;
  font-weight: bold;
  letter-spacing: 1px;
  transition: all .25s ease;
}

.secondaryBtn:hover {
  background: rgba(240,217,138,.12);
  transform: scale(1.05);
}
    #patron {
      font-size: 11px;
      color: #8b6f1e;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="intro">
    <button id="start">▶ BAŞLA</button>
    <div id="subtitle">Kulaklık önerilir.</div>
  </div>
<div id="impactFlash"></div>
  <div id="ui">
    <h1 id="title">ARENA'YA GELSENE</h1>
<button id="join">OYUNA KATIL</button>

<button id="downloadLauncher" class="secondaryBtn">
    LAUNCHER'I İNDİR
</button>

<small id="patron">PATRON HAZIR!</small>
  </div>

  <script>


    function init() {
      console.log('✓ Script başladı');

      const canvas = document.getElementById('canvas');
      const startBtn = document.getElementById('start');
      const uiDiv = document.getElementById('ui');
      const impactFlash = document.getElementById("impactFlash");

      console.log('Canvas:', canvas);
      console.log('Start btn:', startBtn);

      if (!canvas || !startBtn) {
        console.error('❌ DOM elemanları bulunamadı!');
        return;
      }

      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // Particle System
      class Particle {
        constructor(x, y, type = 'wind') {
          this.x = x;
          this.y = y;
          this.type = type;
          this.life = 1;

          if (type === 'wind') {
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = Math.random() * -2 - 0.5;
            this.size = Math.random() * 2 + 0.5;
            this.decay = Math.random() * 0.008 + 0.003;
          } else if (type === 'impact') {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 15 + 8;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = Math.random() * 6 + 2;
            this.decay = Math.random() * 0.02 + 0.012;
          }
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy -= 0.1;
          this.life -= this.decay;
        }

        draw(ctx) {
          const alpha = Math.max(0, Math.min(1, this.life * 0.85));
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#f0d98a';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      let particles = [];

// ==============================
// CINEMATIC SLASH ENGINE
// ==============================

let slashParticles = [];
let slashNoise = [];
let slashFlash = 0;
let slashGlow = 0;
let slashProgress = 0;

// Noise haritası
for (let i = 0; i < 320; i++) {

    slashNoise.push({
        x: Math.random(),
        y: Math.random(),
        s: Math.random(),
        a: Math.random()
    });

}

class SlashParticle {

    constructor(x, y) {

        this.x = x;
        this.y = y;

        const angle = -0.65 + (Math.random() - 0.5) * 0.8;
        const speed = 6 + Math.random() * 10;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.life = 1;

        this.size = 2 + Math.random() * 6;

    }

    update() {

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.985;
        this.vy *= 0.985;

        this.life -= 0.018;

    }

    draw(ctx) {

        if (this.life <= 0) return;

        ctx.globalAlpha = this.life;

        ctx.beginPath();

        ctx.fillStyle = "#FFD54A";

        ctx.arc(
            this.x,
            this.y,
            this.size * this.life,
            0,
            Math.PI * 2
        );

        ctx.fill();

        ctx.globalAlpha = 1;

    }

}

      function addParticles(x, y, count, type = 'wind') {
        for (let i = 0; i < count; i++) {
          particles.push(new Particle(
            x + (Math.random() - 0.5) * 80,
            y + (Math.random() - 0.5) * 40,
            type
          ));
        }
      }

      // Sound Manager
      const sounds = {};
      [
        'wind-sound-fx',
        'battlefield-theme',
        'Charge',
        'impact',
        'bass-drop',
        'undertale-sparkles',
        'accept'
      ].forEach(name => {
        const audio = new Audio(`sounds/${name}.mp3`);
        audio.volume = 0.7;
        sounds[name] = audio;
      });

      console.log('✓ Sesler yüklendi');

      let animProgress = 0;

      let globalAnimStart = 0;
      let soundTiming = {
        impact: false,
        charge: false,
        bassDrop: false,
        sparkles: false
      };
      let shakePower = 0;
      let shakeEndTime = 0;

      function playSound(name) {
        try {
          sounds[name].currentTime = 0;
          const promise = sounds[name].play();
          if (promise && promise.then) {
            promise.catch(e => console.error(name, e));
          }
        } catch (e) {
          console.log(`Sound error: ${name}`);
        }
      }

      function startAnimation() {
        console.log('🎯 START CLICKED');
        if (animState !== 'intro') return;

        animState = 'wind';
        animStartTime = Date.now();
        globalAnimStart = Date.now();
        animProgress = 0;
        document.getElementById('intro').style.display = 'none';
        playSound('wind-sound-fx');
        playSound('battlefield-theme');

        console.log('✓ Animasyon başladı');
      }

 function drawBackground() {
let split = 0;

if (animState === "punch") {

    const p = 0;
split = 0;

}
    const g = ctx.createLinearGradient(
        0,
        0,
        0,
        canvas.height
    );

    g.addColorStop(0, "#060606");
    g.addColorStop(0.25, "#0d0905");
    g.addColorStop(0.5, "#151008");
    g.addColorStop(0.75, "#0c0905");
    g.addColorStop(1, "#040404");

    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Hafif vinyet

    const vignette = ctx.createRadialGradient(

        canvas.width / 2,
        canvas.height / 2,

        200,

        canvas.width / 2,
        canvas.height / 2,

        canvas.width

    );

    vignette.addColorStop(0, "rgba(0,0,0,0)");
    vignette.addColorStop(1, "rgba(0,0,0,.72)");

    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (split > 0) {

    ctx.save();

    ctx.globalAlpha = 0.10;

    ctx.fillStyle = "#FFD54A";

    ctx.beginPath();

    ctx.moveTo(
        canvas.width * 0.42,
        -100
    );

    ctx.bezierCurveTo(

        canvas.width * 0.47,
        canvas.height * 0.25,

        canvas.width * 0.55,
        canvas.height * 0.65,

        canvas.width * 0.60,
        canvas.height + 100

    );

    ctx.lineWidth = split;

    ctx.strokeStyle = "#FFD54A";

    ctx.shadowBlur = 40;

    ctx.shadowColor = "#FFD54A";

    ctx.stroke();

    ctx.restore();

}

}

      // ======================================
// CINEMATIC SLASH
// ======================================

function drawSlash(progress) {

}

      function drawText(text, size, alpha = 1) {
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${size}px Georgia, serif`;
        ctx.fillStyle = '#f0d98a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = `rgba(240, 217, 138, ${0.5 * alpha})`;
        ctx.shadowBlur = 20;
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        ctx.shadowColor = 'transparent';
        ctx.globalAlpha = 1;
      }

      function drawGlow(intensity) {
        const gradient = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, 0,
          canvas.width / 2, canvas.height / 2, canvas.width
        );
        gradient.addColorStop(0, `rgba(240, 217, 138, ${0.08 * intensity})`);
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function updateParticles() {
        particles.forEach(p => p.update());
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => p.draw(ctx));
      }
// ============================
// ARENA ENGINE V2
// ============================

const FX = {
    shake: {
        power: 0,
        endTime: 0
    },

    slash: {
        progress: 0,
        particles: [],
        active: false
    },

    ui: {
        shake: 0,
        showTime: 0
    }
};
      // Animation Loop
      function animate() {
        let shakeX = 0;
        let shakeY = 0;

        if (shakePower > 0) {

          const t = Date.now() - shakeEndTime;

          if (t < 100) {

            shakePower = 24;

          } else if (t < 350) {

            shakePower = 24 * (1 - (t - 100) / 250);

          } else {

            shakePower = 0;

          }

          shakeX = (Math.random() - 0.5) * shakePower;
          shakeY = (Math.random() - 0.5) * shakePower;

        }

        ctx.save();
        ctx.translate(shakeX, shakeY);
        ctx.save();

        if (shakePower > 0) {

          const elapsedShake = Date.now() - shakeEndTime;

          if (elapsedShake < 100) {

            shakePower = 20;

          } else if (elapsedShake < 300) {

            shakePower = 20 * (1 - (elapsedShake - 100) / 200);

          } else {

            shakePower = 0;

          }

          ctx.translate(
            (Math.random() - 0.5) * shakePower,
            (Math.random() - 0.5) * shakePower
          );

        }

        drawBackground();
        const elapsed = Date.now() - animStartTime;

        if (animState === 'wind') {
          animProgress = Math.min(1, elapsed / 5000);

          const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
          gradient.addColorStop(0, `rgba(20, 15, 10, ${0.2 + animProgress * 0.5})`);
          gradient.addColorStop(0.5, `rgba(40, 25, 8, ${0.15 + animProgress * 0.3})`);
          gradient.addColorStop(1, 'rgba(10, 5, 0, 0.1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.save();
          ctx.translate(Math.sin(animProgress * Math.PI) * 80, -animProgress * 120);

          drawGlow(animProgress);

          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          ctx.restore();

          if (elapsed > 5000) {
            animState = 'text';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'text') {
          // Wind VFX arka planda devam
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          drawGlow(0.5);

          const texts = [
            { time: 0, text: 'Savaş yeniden başlıyor...' },
            { time: 1200, text: 'Arena kapıları açıldı.' },
            { time: 2400, text: 'Rakip takım bulundu.' },
            { time: 3200, text: '5 rakip.' },
            { time: 3800, text: '2 dövüşçü.' },
            { time: 4400, text: 'Zafer olasılığı hesaplanıyor...' }
          ];

          let currentText = texts[0];
          for (let t of texts) {
            if (elapsed >= t.time) currentText = t;
          }

          drawText(currentText.text, 36);

          if (elapsed > 5500) {
            animState = 'probability';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'probability') {
          // Wind VFX
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          drawText('%0.4', 140);

          if (elapsed > 1800) {
            animState = 'missing';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'missing') {
          // Wind VFX
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          drawText('Bir dövüşçü eksik.', 36);

          if (elapsed > 1200) {
            animState = 'charge';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'charge') {
          // Wind VFX
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          const chargeProgress = Math.min(1, elapsed / 800);

          for (let i = 0; i < 3; i++) {
            const radius = 80 + i * 60 + chargeProgress * 100;
            ctx.strokeStyle = `rgba(240, 217, 138, ${(1 - chargeProgress) * (0.3 - i * 0.08)})`;
            ctx.lineWidth = 3 + i * 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
            ctx.stroke();
          }

          if (elapsed > 800) {
            animState = 'punch';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'punch') {

    const duration = 520;

    slashProgress = Math.min(1, elapsed / duration);

    if (elapsed >= duration) {

        animState = "hitstop";
        animStartTime = Date.now();

        shakePower = 24;
        shakeEndTime = Date.now();

    }

}

        else if (animState === 'hitstop') {
          // Wind VFX
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          if (elapsed >= 100) {
            animState = 'final';
            animStartTime = Date.now();
          }
        }

        else if (animState === 'final') {
          // Wind VFX
          if (Math.random() < 0.4) {
            addParticles(
              canvas.width / 2 + (Math.random() - 0.5) * 500,
              canvas.height / 2 - 250,
              1,
              'wind'
            );
          }

          const fadeProgress = Math.min(1, elapsed / 400);

          ctx.globalAlpha = fadeProgress;
          ctx.fillStyle = '#050505';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 1;

      if (elapsed > 400) {

    canvas.style.display = "none";

    uiDiv.classList.add("show");
impactFlash.classList.remove("flash");
void impactFlash.offsetWidth;
impactFlash.classList.add("flash");

[
    { transform: "translate(0px,0px) scale(1.00)", filter: "brightness(1)" },

    { transform: "translate(-38px,-24px) scale(1.05)", filter: "brightness(2.6)" },

    { transform: "translate(32px,18px) scale(1.03)", filter: "brightness(1.8)" },

    { transform: "translate(-20px,12px) scale(1.01)", filter: "brightness(1.2)" },

    { transform: "translate(8px,-5px) scale(1.00)", filter: "brightness(1)" },

],

{
    duration: 180,

}

);

impactShake(uiDiv);

    animState = "done";

}
        }

        // GLOBAL timing kontrolü - UI gösterilme zamanından hesapla
        const totalTimeToUI = 5000 + 5500 + 1800 + 1200 + 800 + 200 + 100 + 400;
        const globalElapsed = Date.now() - globalAnimStart;

        // Başlat tuşuna basılmadan hiçbir ses çalışmasın
        if (animState !== "intro") {


          // Impact - UI görünmeden 5.5 saniye önce
          if (!soundTiming.impact && globalElapsed >= totalTimeToUI - 3000) {

            playSound("impact");

            soundTiming.impact = true;

            console.log("🔊 IMPACT");

          }

          // Bass Drop: UI'dan 100 ms önce
          if (!soundTiming.bassDrop && globalElapsed >= totalTimeToUI - 100) {

            playSound("bass-drop");

            soundTiming.bassDrop = true;

            console.log("💥 BASS DROP");

          }

          // Charge - UI görünmeden 4 saniye önce
          if (!soundTiming.charge && globalElapsed >= totalTimeToUI - 4300) {

            playSound("Charge");

            soundTiming.charge = true;

            console.log("⚡ CHARGE");

          }

          // Sparkles - UI göründükten sonra
          if (
            animState === "done" &&
            !soundTiming.sparkles &&
            globalElapsed >= totalTimeToUI + 1000
          ) {

            playSound("undertale-sparkles");

            soundTiming.sparkles = true;

            console.log("✨ SPARKLES");

          }

        }

        // Particles update
        updateParticles();
        ctx.restore();
        requestAnimationFrame(animate);

      }

      animate();

      // Event Listeners
      startBtn.addEventListener('click', startAnimation);
      console.log('✓ Event listener bağlandı');

      const joinBtn = document.getElementById('join');
      if (joinBtn) {

if (downloadBtn) {

    downloadBtn.addEventListener("click", () => {

}
function impactShake(element) {

    const frames = [

        {x:0,y:0,s:1.16},

        {x:-90,y:-60,s:1.13},

        {x:82,y:52,s:1.10},

        {x:-72,y:38,s:1.08},

        {x:60,y:-34,s:1.06},

        {x:-48,y:28,s:1.04},

        {x:36,y:-20,s:1.03},

        {x:-24,y:14,s:1.02},

        {x:15,y:-9,s:1.01},

        {x:-8,y:5,s:1.00},

        {x:3,y:-2,s:1.00},

        {x:0,y:0,s:1.00}

    ];

    let i = 0;

    function nextFrame(){

        if(i>=frames.length){

            element.style.transform="";
            return;

        }

        const f = frames[i];

        element.style.transform =
            `translate(${f.x}px,${f.y}px) scale(${f.s})`;

        i++;

        setTimeout(nextFrame,12);

    }

    nextFrame();

}
} // init() burada biter

// DOM yüklendiğinde başla
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
